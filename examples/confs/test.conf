server {
    listen 127.0.0.1:8080;
    server_name yaman;
    client_max_body_size 10G;

    location assets
    {
        root examples/website1/assets;
        methods GET;
    }
    location / {
        root examples/website1;
        methods GET;
        autoindex on;
        index src/home.html;
    }
}

