


server {
    listen 127.0.0.1:8080;
    server_name yaman;
    client_max_body_size 10G;

    location assets
    {
        root examples/website1/assets;
        methods GET;
    }
    location / {
        root examples/website1;
        methods GET;
        autoindex on;
        index src/home.html;
    }
}

server {
    listen 20058;
    server_name redir_test;
    client_max_body_size 10K;

    location /src {
        root examples/website1;
        methods GET;
    }

    location /assets {
        root examples/website1;
        methods GET;
    }

    location / {
        methods GET;
        return 301 /src/home.html;
    }
}

server {
    listen 20059;
    server_name cookie_tester;
    client_max_body_size 1;

    location / {
        root examples/cookie-showcase;
        index cookie_header.html;
        methods GET POST;
        cgi_interpreter /bin/python3    .py;
        cgi_interpreter /bin/bash       .sh;
    }
}

server {
    listen 20060;
    server_name upload_test;
    client_max_body_size 1G;

    location / {
        root examples/upload_del;
        upload_store examples/upload_del;
        methods DELETE GET POST;
        cgi_interpreter /bin/python3    .py;
        cgi_interpreter /bin/bash       .sh;
    }

}

server {
    listen 16326;
    server_name web_cgi;
    client_max_body_size 10K;

    location /assets {
        root examples/website1;
        methods GET;
    }

    location /src {
        root examples/website1;
        methods GET;
    }

    location / {
        methods GET;
        return 301 /src/home.html;
    }

    location /cgi-bin {
        root examples/cookie-showcase;
        methods GET POST;
        cgi_interpreter /bin/python3    .py;
        cgi_interpreter /bin/bash       .sh;
    }
}

server {
    listen 192.168.1.144:16327;
    server_name doc_showcase;

    location / {
        root docs/doxygen;
        methods GET;
        autoindex on;
    }
}

