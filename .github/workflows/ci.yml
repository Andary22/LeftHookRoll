name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: [debian:latest, fedora:latest]
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      
      - name: Install Debian Deps.
        if: contains(matrix.container, 'debian')
        run: apt-get update && apt-get install -y build-essential bash python3
        
      - name: Install Fedora Deps.
        if: contains(matrix.container, 'fedora')
        run: dnf install -y gcc-c++ make bash python3
        
      - name: Run Tests
        run: bash tests/tester.sh