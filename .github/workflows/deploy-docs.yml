name: Deploy and Release Documentation

on:
  push:
    branches: ["main"]
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # Required for releases and Pages
  pages: write
  id-token: write
  pull-requests: write # Required if Vale reports to PRs

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vale Linter
        uses: errata-ai/vale-action@reviewdog
        with:
          files: docs/
          reporter: github-check
          fail_on_error: true

  deploy:
    needs: lint-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies (Doxygen, Graphviz)
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Python Dependencies (MkDocs)
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material

      - name: Generate Doxygen Documentation
        run: doxygen Doxyfile

      - name: Build MkDocs Site
        run: mkdocs build

      - name: Merge Doxygen into MkDocs
        # Injects the low-level C++ reference into the static MkDocs site
        run: |
          mkdir -p site/api
          cp -r docs/doxygen/html/* site/api/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site' # Uploading the unified MkDocs directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Package Documentation
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd site
          zip -r ../documentation.zip .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: documentation.zip
          body: |
            [Automated API & Narrative Documentation for ${{ github.ref_name }}](https://andary22.github.io/LeftHookRoll/)